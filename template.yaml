AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: JurisAI - SaaS de gestão de processos judiciais

Globals:
  Function:
    Runtime: dotnet8
    Architectures: [arm64]
    MemorySize: 512
    Timeout: 30
    Environment:
      Variables:
        DYNAMODB_TABLE: !Ref JurisAITable
        S3_BUCKET_NAME: !Ref DocumentosBucket
        COGNITO_USER_POOL_ID: !Ref UserPool
        ANTHROPIC_API_KEY: !Sub '{{resolve:secretsmanager:jurisai/anthropic:SecretString:api_key}}'
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: "'*'"

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Resources:
  # ============================================================
  # DynamoDB — Single Table Design
  # ============================================================
  JurisAITable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'jurisai-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: deletedAt
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

  # ============================================================
  # Cognito User Pool
  # ============================================================
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub 'jurisai-${Environment}'
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: email
          AttributeDataType: String
          Mutable: false
          Required: true
      EmailVerificationMessage: 'Seu código de verificação JurisAI: {####}'
      EmailVerificationSubject: 'Verificação de e-mail — JurisAI'

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub 'jurisai-frontend-${Environment}'
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      PreventUserExistenceErrors: ENABLED

  # ============================================================
  # S3 — Documentos
  # ============================================================
  DocumentosBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'jurisai-documentos-${Environment}-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ============================================================
  # SQS — Alertas de Prazos
  # ============================================================
  AlertasPrazosDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'jurisai-alertas-dlq-${Environment}'
      MessageRetentionPeriod: 1209600  # 14 dias

  AlertasPrazosQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'jurisai-alertas-${Environment}'
      VisibilityTimeout: 60
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AlertasPrazosDLQ.Arn
        maxReceiveCount: 3

  # ============================================================
  # API Gateway HTTP API
  # ============================================================
  JurisAIApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: '$request.header.Authorization'
            JwtConfiguration:
              issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}'
              audience:
                - !Ref UserPoolClient

  # ============================================================
  # Lambda Functions
  # ============================================================
  ProcessosFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'jurisai-processos-${Environment}'
      CodeUri: src/JurisAI.Lambda/
      Handler: JurisAI.Lambda::JurisAI.Lambda.Functions.ProcessosFunction::FunctionHandler
      Description: Gerenciamento de processos judiciais
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JurisAITable
        - S3ReadPolicy:
            BucketName: !Ref DocumentosBucket
      Events:
        GetProcessos:
          Type: HttpApi
          Properties:
            ApiId: !Ref JurisAIApi
            Path: /processos
            Method: GET
        PostProcesso:
          Type: HttpApi
          Properties:
            ApiId: !Ref JurisAIApi
            Path: /processos
            Method: POST
        GetProcesso:
          Type: HttpApi
          Properties:
            ApiId: !Ref JurisAIApi
            Path: /processos/{id}
            Method: GET
        PutProcesso:
          Type: HttpApi
          Properties:
            ApiId: !Ref JurisAIApi
            Path: /processos/{id}
            Method: PUT
        DeleteProcesso:
          Type: HttpApi
          Properties:
            ApiId: !Ref JurisAIApi
            Path: /processos/{id}
            Method: DELETE
        ConsultarCNJ:
          Type: HttpApi
          Properties:
            ApiId: !Ref JurisAIApi
            Path: /processos/{id}/consultar-cnj
            Method: POST

  ClientesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'jurisai-clientes-${Environment}'
      CodeUri: src/JurisAI.Lambda/
      Handler: JurisAI.Lambda::JurisAI.Lambda.Functions.ClientesFunction::FunctionHandler
      Description: Gerenciamento de clientes
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JurisAITable
      Events:
        GetClientes:
          Type: HttpApi
          Properties:
            ApiId: !Ref JurisAIApi
            Path: /clientes
            Method: GET
        PostCliente:
          Type: HttpApi
          Properties:
            ApiId: !Ref JurisAIApi
            Path: /clientes
            Method: POST
        GetCliente:
          Type: HttpApi
          Properties:
            ApiId: !Ref JurisAIApi
            Path: /clientes/{id}
            Method: GET
        PutCliente:
          Type: HttpApi
          Properties:
            ApiId: !Ref JurisAIApi
            Path: /clientes/{id}
            Method: PUT

  HonorariosFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'jurisai-honorarios-${Environment}'
      CodeUri: src/JurisAI.Lambda/
      Handler: JurisAI.Lambda::JurisAI.Lambda.Functions.HonorariosFunction::FunctionHandler
      Description: Gerenciamento de honorários
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JurisAITable
      Events:
        GetHonorarios:
          Type: HttpApi
          Properties:
            ApiId: !Ref JurisAIApi
            Path: /honorarios
            Method: GET
        PostHonorario:
          Type: HttpApi
          Properties:
            ApiId: !Ref JurisAIApi
            Path: /honorarios
            Method: POST
        PagarHonorario:
          Type: HttpApi
          Properties:
            ApiId: !Ref JurisAIApi
            Path: /honorarios/{id}/pagar
            Method: PUT

  IAFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'jurisai-ia-${Environment}'
      CodeUri: src/JurisAI.Lambda/
      Handler: JurisAI.Lambda::JurisAI.Lambda.Functions.IAFunction::FunctionHandler
      MemorySize: 1024
      Timeout: 60
      Description: Geração de peças com IA (Claude)
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JurisAITable
        - S3CrudPolicy:
            BucketName: !Ref DocumentosBucket
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:jurisai/*'
      Events:
        GerarPeca:
          Type: HttpApi
          Properties:
            ApiId: !Ref JurisAIApi
            Path: /ia/gerar-peca
            Method: POST
        ListarPecas:
          Type: HttpApi
          Properties:
            ApiId: !Ref JurisAIApi
            Path: /ia/pecas
            Method: GET

  PrazosWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'jurisai-prazos-worker-${Environment}'
      CodeUri: src/JurisAI.Lambda/
      Handler: JurisAI.Lambda::JurisAI.Lambda.Functions.PrazosWorkerFunction::FunctionHandler
      Description: Worker de alertas de prazo (diário às 8h)
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JurisAITable
        - SESCrudPolicy:
            IdentityName: '*'
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 8 * * ? *)
            Description: Verifica prazos todo dia às 8h UTC

Outputs:
  ApiUrl:
    Description: URL da API Gateway
    Value: !Sub 'https://${JurisAIApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub 'JurisAIApiUrl-${Environment}'

  UserPoolId:
    Description: ID do Cognito User Pool
    Value: !Ref UserPool
    Export:
      Name: !Sub 'JurisAIUserPoolId-${Environment}'

  UserPoolClientId:
    Description: ID do Client do Cognito
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub 'JurisAIUserPoolClientId-${Environment}'

  DynamoDBTableName:
    Description: Nome da tabela DynamoDB
    Value: !Ref JurisAITable
